services:
  postgres:
    image: docker.io/library/postgres:18
    container_name: ticketsystem-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ticketsystem}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ticketsystem}
      POSTGRES_DB: ${POSTGRES_DB:-ticketsystem}
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ticketsystem} -d ${POSTGRES_DB:-ticketsystem}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ticketsystem-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=TicketSystem
      - DEBUG=false
      - ENVIRONMENT=production
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-ticketsystem}:${POSTGRES_PASSWORD:-ticketsystem}@postgres:5432/${POSTGRES_DB:-ticketsystem}
      - ALLOWED_ORIGINS=["http://localhost:8080","http://localhost:3000"]
      - UPLOAD_DIR=uploads
      - MAX_UPLOAD_SIZE_MB=10
    volumes:
      - backend-uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ticketsystem-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres-data:
  backend-uploads:
