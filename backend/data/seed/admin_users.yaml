# Seed admin users created during database initialisation.
#
# WARNING: Development defaults only. All users have force_password_change: true
# so the plain-text passwords below must be changed on first login.
#
# All users are created in migration 0001. Users without an "organization"
# field and with is_superuser: true are automatically assigned to THW-Leitung.
# Users with an explicit "organization" field are assigned to the named node.

users:
  - email: admin@example.com
    full_name: Admin
    password: admin
    is_superuser: true
    force_password_change: true
    groups:
      - helfende
      - admin
    # no organization — automatically assigned to THW-Leitung as superuser

  - email: superadmin@example.com
    full_name: Super Admin
    password: superadmin
    is_superuser: true
    force_password_change: true
    organization: THW-Leitung
    groups:
      - helfende
      - admin
