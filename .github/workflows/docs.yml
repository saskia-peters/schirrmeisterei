name: Refresh MkDocs Documentation

on:
  push:
    branches:
      - master
      - main

jobs:
  build-and-commit-docs:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so git push works correctly
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs and theme
        run: pip install mkdocs==1.6.1 mkdocs-material

      - name: Build documentation
        run: cd assets/mkdocs && mkdocs build

      - name: Commit and push updated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No documentation changes to commit."
          else
            git commit -m "chore: refresh MkDocs documentation [skip ci]"
            git push
          fi
