services:
  postgres:
    image: docker.io/library/postgres:18
    container_name: ticketsystem-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ticketsystem
      POSTGRES_PASSWORD: ticketsystem
      POSTGRES_DB: ticketsystem
    ports:
      - "5432:5432"
    volumes:
      - dev-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketsystem -d ticketsystem"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ticketsystem-backend-dev
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - ENVIRONMENT=development
      - SECRET_KEY=dev-secret-key-not-for-production
      - DATABASE_URL=postgresql+asyncpg://ticketsystem:ticketsystem@postgres:5432/ticketsystem
      - ALLOWED_ORIGINS=["http://localhost:3000","http://localhost:8080"]
    volumes:
      - ./backend:/app
      - dev-uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: docker.io/library/node:20-slim
    container_name: ticketsystem-frontend-dev
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  dev-postgres-data:
  dev-uploads:
